<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AniTalk NEXT</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0f;
  color: white;
}

.hero {
  height: 240px;
  background: url("https://images.unsplash.com/photo-1531259683007-016a7b628fc3?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  display:flex;
  align-items:center;
  justify-content:center;
  position: relative;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.6);
}

.hero h1 {
  position: relative;
  z-index: 2;
  color:#00fff7;
}

.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
  text-decoration:none;
  color:white;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card h3 {
  margin:10px;
  color:#ff00cc;
}

.card p {
  margin:10px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="hero">
  <h1>AniTalk NEXT</h1>
</div>

<div class="container" id="list"></div>

<script>

let animeList = [];

/* 🔥 NORMALIZATION FUNCTION */
function normalize(name) {
  return name
    .replace(/season\s*\d+/i, "")
    .replace(/part\s*\d+/i, "")
    .replace(/:\s.*$/g, "")
    .replace(/\(.*?\)/g, "")
    .trim();
}

async function load() {
  const res = await fetch("https://api.jikan.moe/v4/top/anime?page=1");
  const data = await res.json();

  let seen = new Map(); // 🔥 removes duplicates

  animeList = data.data.map(a => {
    const cleanName = normalize(a.title);

    if (!seen.has(cleanName)) {
      seen.set(cleanName, true);

      return {
        id: a.mal_id,
        name: cleanName,
        img: a.images.jpg.image_url,
        desc: a.synopsis ? a.synopsis.slice(0, 90) : "No description"
      };
    }

    return null;
  }).filter(Boolean);

  render();
}

function render() {
  document.getElementById("list").innerHTML =
    animeList.map(a => `
      <a class="card" href="room.html?id=${a.id}&name=${encodeURIComponent(a.name)}">
        <img src="${a.img}">
        <h3>${a.name}</h3>
        <p>${a.desc}</p>
      </a>
    `).join("");
}

load();

</script>

</body>
</html>
