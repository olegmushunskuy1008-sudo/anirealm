<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AniTalk Forum</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #0a0a0f;
  color: white;
}

/* neon background */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, #ff00cc55, transparent 40%),
              radial-gradient(circle at 80% 30%, #00fff755, transparent 40%),
              radial-gradient(circle at 50% 80%, #7a00ff55, transparent 40%);
  filter: blur(60px);
  animation: move 12s infinite linear;
  z-index: 0;
}

@keyframes move {
  0% {transform: translate(0,0);}
  50% {transform: translate(-10%,-10%);}
  100% {transform: translate(0,0);}
}

header {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  font-size: 40px;
  color: #00fff7;
  text-shadow: 0 0 20px #00fff7;
}

p {
  opacity: 0.7;
}

.container {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* anime cards */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 25px #ff00cc;
}

.card h2 {
  color: #ff00cc;
  font-size: 18px;
}

.card p {
  font-size: 12px;
  opacity: 0.7;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
}

.nav button {
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.nav button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff00cc;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <h1>⚡ AniTalk ⚡</h1>
  <p>Anime discussions in real time (soon)</p>

  <div class="nav">
    <button>Home</button>
    <button>Trending</button>
    <button>Create Post</button>
  </div>
</header>

<div class="container">

  <a class="card" href="room.html?anime=Jujutsu%20Kaisen">
    <h2>Jujutsu Kaisen</h2>
    <p>Discuss Gojo, Sukuna, fights</p>
  </a>

  <a class="card" href="room.html?anime=Naruto">
    <h2>Naruto</h2>
    <p>Ninja world discussions</p>
  </a>

  <a class="card" href="room.html?anime=One%20Piece">
    <h2>One Piece</h2>
    <p>Straw Hats adventures</p>
  </a>

  <a class="card" href="room.html?anime=Attack%20on%20Titan">
    <h2>Attack on Titan</h2>
    <p>Titans & theories</p>
  </a>

</div>

</body>
</html>
