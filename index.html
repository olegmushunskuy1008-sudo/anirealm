<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anime Site</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Orbitron', sans-serif;
  color: white;
  overflow: hidden;
  background: black;
}

/* anime moving background */
.bg {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, #ff00cc, transparent 40%),
              radial-gradient(circle at 80% 30%, #00fff7, transparent 40%),
              radial-gradient(circle at 50% 80%, #7a00ff, transparent 40%);
  animation: move 10s infinite linear;
  filter: blur(40px);
}

@keyframes move {
  0% {transform: translate(0,0);}
  50% {transform: translate(-10%, -10%);}
  100% {transform: translate(0,0);}
}

.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.glow {
  font-size: 40px;
  text-shadow: 0 0 10px #ff00cc, 0 0 20px #00fff7;
}

.sub {
  opacity: 0.8;
  margin-top: 10px;
}

.btn {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #ff00cc, #00fff7);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff00cc;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <div class="glow">⚡ ANIME WORLD ⚡</div>
  <div class="sub">Welcome to your neon anime website</div>
  <button class="btn">Enter</button>
</div>

</body>
</html>
