<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anime Room</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0f;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  color: #00fff7;
  font-size: 24px;
  border-bottom: 1px solid #222;
}

.chat {
  max-width: 600px;
  margin: 20px auto;
  padding: 10px;
}

.messages {
  height: 400px;
  overflow-y: auto;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 10px;
  background: #111;
}

.msg {
  padding: 8px;
  margin: 5px 0;
  background: #1a1a1a;
  border-radius: 8px;
}

.input-box {
  display: flex;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #00fff7;
  cursor: pointer;
  border-radius: 8px;
}
</style>
</head>

<body>

<header id="title">Anime Room</header>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="text" placeholder="Write message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
// отримуємо назву аніме з URL
const params = new URLSearchParams(window.location.search);
const anime = params.get("anime");

document.getElementById("title").innerText = "⚡ " + anime + " Chat";

// простий локальний чат
function send() {
  const input = document.getElementById("text");
  const msg = input.value;

  if (!msg) return;

  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = "You: " + msg;

  document.getElementById("messages").appendChild(div);

  input.value = "";
}
</script>

</body>
</html>
