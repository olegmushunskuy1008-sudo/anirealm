<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AniTalk Room</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0f;
  color:white;
}

header {
  padding:20px;
  text-align:center;
  color:#00fff7;
  border-bottom:1px solid #222;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.post-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  padding:10px 15px;
  border:none;
  background:#ff00cc;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.post {
  background:#111;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<header id="title">Anime Room</header>

<div class="container">

  <div class="post-box">
    <input id="msg" placeholder="Write something..." />
    <button onclick="post()">Send</button>
  </div>

  <div id="posts"></div>

</div>

<script>

const params = new URLSearchParams(location.search);
const name = params.get("name");

document.getElementById("title").innerText = "Discussion: " + name;

let key = "posts_" + name;
let posts = JSON.parse(localStorage.getItem(key) || "[]");

function render() {
  document.getElementById("posts").innerHTML =
    posts.map(p => `<div class="post">${p}</div>`).join("");
}

function post() {
  let text = document.getElementById("msg").value;
  if(!text) return;

  posts.push(text);
  localStorage.setItem(key, JSON.stringify(posts));

  document.getElementById("msg").value = "";
  render();
}

render();

</script>

</body>
</html>
